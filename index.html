<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>Cubing Chain | 魔術方塊社群與對戰計時</title>
    <link rel="icon" type="image/jpeg" href="./icon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-blue-500 selection:text-white overflow-x-hidden">
    
    <nav class="absolute top-0 w-full p-4 lg:p-6 flex justify-between items-center z-50 bg-white/60 backdrop-blur-md lg:bg-transparent lg:backdrop-blur-none">
        <div class="flex items-center gap-2 lg:gap-3">
            <img src="./icon.jpg" alt="Cubing Chain Logo" class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg lg:rounded-xl shadow-md">
            <div class="text-xl lg:text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-emerald-500">
                Cubing Chain
            </div>
        </div>
    </nav>

    <div class="relative min-h-screen flex flex-col justify-center pt-24 pb-0 lg:pt-0 lg:flex-row lg:items-center">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full max-w-4xl opacity-50 pointer-events-none overflow-hidden">
            <div class="absolute top-10 left-10 w-64 h-64 lg:w-96 lg:h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-[80px] lg:blur-[100px] animate-blob"></div>
            <div class="absolute top-10 right-10 w-64 h-64 lg:w-96 lg:h-96 bg-cyan-200 rounded-full mix-blend-multiply filter blur-[80px] lg:blur-[100px] animate-blob animation-delay-2000"></div>
            <div class="absolute bottom-10 left-1/2 w-64 h-64 lg:w-96 lg:h-96 bg-emerald-200 rounded-full mix-blend-multiply filter blur-[80px] lg:blur-[100px] animate-blob animation-delay-4000"></div>
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col lg:flex-row items-center justify-between gap-6 lg:gap-16 relative z-10 w-full">
            
            <div class="w-full lg:w-1/2 text-center lg:text-left flex flex-col items-center lg:items-start mt-2 lg:mt-0">
                
                <div class="inline-flex items-center gap-2 px-3 py-1.5 lg:px-4 lg:py-2 rounded-full bg-blue-100 border border-blue-200 text-blue-700 text-xs lg:text-sm font-bold mb-4 lg:mb-6 shadow-sm">
                    <span class="relative flex h-2 w-2 lg:h-2.5 lg:w-2.5">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 lg:h-2.5 lg:w-2.5 bg-blue-600"></span>
                    </span>
                    V1 正式版 雙平台即將上線
                </div>
                
                <h1 class="text-4xl sm:text-5xl lg:text-7xl font-black tracking-tight mb-3 lg:mb-6 leading-tight text-slate-800">
                    告別單機練習<br>
                    <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 via-cyan-500 to-emerald-500">
                        迎接全球連線
                    </span>
                </h1>
                
                <p class="text-base sm:text-lg lg:text-xl text-slate-600 mb-6 lg:mb-10 max-w-[300px] sm:max-w-lg leading-relaxed">
                    整合線上、線下對戰、WCA 名片、專業計時器與公式庫<br class="hidden lg:block">
                    Cubing Chain 不只是一個工具，而是新的魔方社群
                </p>
                
                <div class="flex flex-row gap-3 lg:gap-4 w-full justify-center lg:justify-start items-center">
                    <a href="https://apps.apple.com/app/id6761001947" target="_blank" class="hover:opacity-80 transition transform hover:scale-105 drop-shadow-md">
                        <img src="./apple-badge.svg" alt="Download on the App Store" class="h-10 sm:h-12 lg:h-14">
                    </a>

                    <a href="https://play.google.com/store/apps/details?id=com.creator.cubingchain" target="_blank" class="hover:opacity-80 transition transform hover:scale-105 drop-shadow-md">
                        <img src="./google-badge.png" alt="Get it on Google Play" class="h-10 sm:h-12 lg:h-14">
                    </a>
                </div>
            </div>

            <div class="w-full lg:w-1/2 relative flex justify-center mt-8 lg:mt-0 px-4">
                <div class="relative w-[260px] h-[480px] lg:w-72 lg:h-[600px] bg-slate-900 rounded-t-[2.5rem] rounded-b-none lg:rounded-[3.5rem] border-[10px] lg:border-[14px] border-b-0 lg:border-b-[14px] border-slate-900 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] lg:shadow-[0_30px_60px_rgba(0,0,0,0.2)] transform rotate-0 lg:rotate-[-5deg] lg:hover:rotate-0 transition duration-500 flex flex-col overflow-hidden">

                    <img src="./app-screenshot.png" alt="Cubing Chain App 截圖" class="absolute inset-0 w-full h-full object-cover object-top z-10 lg:rounded-[2.5rem]">

                    <div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/10 to-white/0 z-20 pointer-events-none lg:rounded-[2.5rem]"></div>
                </div>
